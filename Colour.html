<!DOCTYPE html>
<html>
<head>
<title>Color Reference</title>

<style>

/* 1️⃣ Background Color */
body {
    background-color: #f2f2f2;
    font-family: Arial;
}

/* 2️⃣ Text Color */
.text-color {
    color: red;
}

/* 3️⃣ HEX Color */
.hex-color {
    color: #0066ff;
}

/* 4️⃣ RGB Color */
.rgb-color {
    color: rgb(255, 100, 0);
}

/* 5️⃣ RGBA (with transparency) */
.rgba-color {
    color: rgba(0, 128, 0, 0.6);
}

/* 6️⃣ HSL Color */
.hsl-color {
    color: hsl(300, 70%, 40%);
}

/* 7️⃣ Background + Text Color */
.box1 {
    background-color: yellow;
    color: black;
    padding: 10px;
}

/* 8️⃣ Border Color */
.border-color {
    border: 3px solid blue;
    padding: 10px;
}

/* 9️⃣ Opacity */
.opacity-box {
    background-color: red;
    opacity: 0.5;
    padding: 10px;
}

/* 🔟 Gradient Background */
.gradient {
    background: linear-gradient(to right, red, orange, yellow);
    padding: 15px;
    color: white;
}

</style>
</head>

<body>

<h1>🎨 Color Properties Reference</h1>

<p class="text-color">Normal color property</p>

<p class="hex-color">HEX color example</p>

<p class="rgb-color">RGB color example</p>

<p class="rgba-color">RGBA with transparency</p>

<p class="hsl-color">HSL color example</p>

<div class="box1">Background color + text color</div>

<div class="border-color">Border color example</div>

<div class="opacity-box">Opacity example</div>

<div class="gradient">Gradient background example</div>

</body>
</html>
